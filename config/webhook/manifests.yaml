---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: webhook-service
        namespace: kubebuilder-system
        path: /mutate-apps-example-com-v1alpha1-vibeapp
    failurePolicy: Fail
    name: mvibeapp-v1alpha1.kb.io
    rules:
      - apiGroups:
          - apps.example.com
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - vibeapps
    sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: webhook-service
        namespace: kubebuilder-system
        path: /validate-apps-example-com-v1alpha1-vibeapp
    failurePolicy: Fail
    name: vvibeapp-v1alpha1.kb.io
    rules:
      - apiGroups:
          - apps.example.com
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - vibeapps
    sideEffects: None
